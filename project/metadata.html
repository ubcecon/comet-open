<script>
(function() {
    function updateThemeImages() {
        var isDark = document.body.classList.contains('quarto-dark');
        var images = document.querySelectorAll('img[data-light-src][data-dark-src]');

        images.forEach(function(img) {
            var lightSrc = img.getAttribute('data-light-src');
            var darkSrc = img.getAttribute('data-dark-src');
            var newSrc = isDark ? darkSrc : lightSrc;

            // Only update if src is different to avoid reload flicker
            if (img.getAttribute('src') !== newSrc) {
                img.setAttribute('src', newSrc);
            }
        });
    }

    // Run when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
        updateThemeImages();

        // Watch for theme changes on body
        var observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.attributeName === 'class') {
                    updateThemeImages();
                }
            });
        });

        observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    });

    // Also run after full page load
    window.addEventListener('load', updateThemeImages);
})();
</script>
